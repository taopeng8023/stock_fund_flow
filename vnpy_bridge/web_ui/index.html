<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股量化选股系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600;color:#f8fafc}
.nav{display:flex;gap:4px;background:#1e293b;padding:8px 24px 0;border-bottom:1px solid #334155}
.nav-btn{background:none;border:none;color:#94a3b8;padding:10px 20px;cursor:pointer;font-size:14px;border-radius:6px 6px 0 0;transition:all .2s}
.nav-btn:hover{color:#e2e8f0;background:#0f172a}
.nav-btn.active{color:#38bdf8;background:#0f172a;border-bottom:2px solid #38bdf8}
.main{padding:24px;max-width:1400px;margin:0 auto}
.tab{display:none}
.tab.active{display:block}
.card{background:#1e293b;border-radius:8px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card h3{font-size:16px;margin-bottom:12px;color:#f8fafc;border-bottom:1px solid #334155;padding-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat{text-align:center}
.stat-value{font-size:28px;font-weight:700}
.stat-label{font-size:12px;color:#94a3b8;margin-top:4px}
.positive{color:#22c55e}
.negative{color:#ef4444}
.warning{color:#f59e0b}
.neutral{color:#94a3b8}
.bull{color:#22c55e}
.bear{color:#ef4444}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px;border-bottom:1px solid #334155;color:#94a3b8;font-weight:500}
td{padding:8px;border-bottom:1px solid #1e293b}
tr:hover{background:#0f172a}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px}
.tag-bull{background:#14532d;color:#22c55e}
.tag-bear{background:#450a0a;color:#ef4444}
.tag-info{background:#1e3a5f;color:#38bdf8}
.regime-badge{padding:8px 20px;border-radius:12px;font-size:18px;font-weight:700;display:inline-block}
.bg-bull{background:#14532d;color:#22c55e}
.bg-bear{background:#450a0a;color:#ef4444}
.bg-range{background:#1e3a5f;color:#38bdf8}
.bar-wrap{background:#334155;border-radius:4px;height:20px;margin:2px 0;overflow:hidden}
.bar-up{background:#22c55e;height:100%;border-radius:4px}
.bar-down{background:#ef4444;height:100%;border-radius:4px}
.risk-critical{color:#ef4444;font-weight:700}
.risk-high{color:#f97316;font-weight:600}
.risk-medium{color:#f59e0b}
.risk-low{color:#22c55e}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff}
.loading{text-align:center;padding:40px;color:#94a3b8}
.error{background:#450a0a;color:#fca5a5;padding:12px;border-radius:6px}
canvas{max-height:300px}
</style>
</head>
<body>
<div class="header">
  <h1>A股量化选股系统</h1>
  <span style="color:#94a3b8;font-size:13px" id="clock">--</span>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('diagnosis', this)">盘面诊断</button>
  <button class="nav-btn" onclick="switchTab('picks', this)">选股结果</button>
  <button class="nav-btn" onclick="switchTab('performance', this)">绩效追踪</button>
  <button class="nav-btn" onclick="switchTab('control', this)">调度控制</button>
</div>
<div class="main">

  <!-- Tab 1: 盘面诊断 -->
  <div id="tab-diagnosis" class="tab active">
    <div id="diag-content"><div class="loading">加载中...</div></div>
  </div>

  <!-- Tab 2: 选股结果 -->
  <div id="tab-picks" class="tab">
    <div class="card" style="margin-bottom:16px">
      <label>日期: <input type="text" id="pick-date" style="background:#0f172a;color:#e2e8f0;border:1px solid #334155;padding:6px 10px;border-radius:4px;width:120px" placeholder="YYYYMMDD"></label>
      <label style="margin-left:12px">数量: <select id="pick-top" style="background:#0f172a;color:#e2e8f0;border:1px solid #334155;padding:6px 10px;border-radius:4px">
        <option value="3">3</option><option value="5" selected>5</option><option value="10">10</option>
      </select></label>
      <button class="btn btn-primary" onclick="loadPicks()" style="margin-left:12px">查询</button>
    </div>
    <div id="picks-content"><div class="loading">点击查询加载选股结果</div></div>
  </div>

  <!-- Tab 3: 绩效追踪 -->
  <div id="tab-performance" class="tab">
    <div id="perf-content"><div class="loading">加载中...</div></div>
  </div>

  <!-- Tab 4: 调度控制 -->
  <div id="tab-control" class="tab">
    <div class="card">
      <h3>调度器管理</h3>
      <div id="scheduler-status" style="margin:12px 0"></div>
      <button class="btn btn-primary" onclick="triggerPipeline()">立即执行管线</button>
      <span id="pipeline-result" style="margin-left:12px;font-size:13px"></span>
    </div>
    <div class="card">
      <h3>最近日志</h3>
      <pre id="pipeline-log" style="background:#0f172a;padding:12px;border-radius:4px;font-size:11px;max-height:300px;overflow-y:auto;white-space:pre-wrap"></pre>
    </div>
  </div>

</div>

<script>
const API = '';

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  if(name=='diagnosis') loadDiagnosis();
  else if(name=='performance') loadPerformance();
  else if(name=='control') loadSchedulerStatus();
}

async function fetchAPI(path) {
  try {
    const r = await fetch(API+path);
    if(!r.ok) throw new Error(r.status+' '+r.statusText);
    return await r.json();
  } catch(e) {
    return {_error: e.message};
  }
}

function showError(el, fnName, e) {
  el.innerHTML = '<div class="error">[' + fnName + '] ' + e.message + '</div>';
  console.error('[' + fnName + ']', e);
}

// ── Diagnosis ──
async function loadDiagnosis() {
  const el = document.getElementById('diag-content');
  try {
  el.innerHTML = '<div class="loading">加载中...</div>';
  const data = await fetchAPI('/api/market_diagnosis');
  if(!data.available) { el.innerHTML='<div class="error">数据不可用，请先运行数据采集</div>'; return; }
  const d = data.diagnosis;
  const r = d.risk_level || 'low';
  const riskLabel = {low:'低',medium:'中',high:'高',critical:'极高'}[r]||r;
  const riskClass = 'risk-'+r;

  // Parse JSON fields (including sentiment)
  ['top_sectors','bottom_sectors','risk_alerts','sentiment_components','sentiment_detail','indices_data'].forEach(k => {
    if(typeof d[k]==='string') try{d[k]=JSON.parse(d[k])}catch(e){d[k]={}}
  });

  const regimeClass = d.regime && d.regime.startsWith('bull') ? 'bg-bull' : d.regime && d.regime.startsWith('bear') ? 'bg-bear' : 'bg-range';

  // ── Sentiment data ──
  const st = d.sentiment_score || 50;
  const stLabel = d.sentiment_label || '--';
  const stLevel = d.sentiment_level || 'neutral';
  const stColor = st>=75?'#ef4444':st>=60?'#f97316':st>=40?'#94a3b8':st>=25?'#38bdf8':'#22c55e';
  const stComp = d.sentiment_components || {};
  const stDetail = d.sentiment_detail || {};
  const indices = d.indices_data || {};

  // Index bar HTML
  function idxBar(key, label) {
    const ix = indices[key];
    if(!ix) return '';
    const cls = ix.chg_pct>=0?'positive':'negative';
    const sign = ix.chg_pct>=0?'+':'';
    return `<div style="text-align:center;padding:4px 12px;border-radius:4px;background:#0f172a">
      <div style="font-size:11px;color:#94a3b8">${label}</div>
      <div style="font-size:16px;font-weight:700">${(ix.price||0).toFixed(2)}</div>
      <div class="${cls}" style="font-size:13px;font-weight:600">${sign}${(ix.chg_pct||0).toFixed(2)}%</div>
      <div style="font-size:10px;color:#64748b">${(ix.chg_amt||0)>=0?'+':''}${(ix.chg_amt||0).toFixed(2)}</div>
    </div>`;
  }

  let html = `
  <!-- ═══ 市场情绪 + 指数 ═══ -->
  <div class="card" style="padding:16px 20px;margin-bottom:16px">
    <h3>市场情绪温度计</h3>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div style="text-align:center;min-width:120px">
        <div style="position:relative;width:80px;height:80px;border-radius:50%;background:conic-gradient(${stColor} ${st}%, #334155 0);margin:0 auto 8px;display:flex;align-items:center;justify-content:center">
          <div style="width:62px;height:62px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center">
            <span style="font-size:22px;font-weight:800;color:${stColor}">${st}</span>
          </div>
        </div>
        <div style="font-size:13px;font-weight:600;color:${stColor}">${stLabel}</div>
      </div>
      <div style="flex:1;min-width:280px">
        <div class="grid4" style="gap:8px">
          <div>
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">涨跌宽度</div>
            <div class="bar-wrap" style="height:14px"><div class="bar-up" style="width:${(stComp.breadth||0)/25*100}%;height:100%"></div></div>
            <span style="font-size:11px;float:right">${(stComp.breadth||0).toFixed(0)}/25</span>
          </div>
          <div>
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">资金流</div>
            <div class="bar-wrap" style="height:14px"><div class="bar-up" style="width:${(stComp.fund_flow||0)/25*100}%;height:100%"></div></div>
            <span style="font-size:11px;float:right">${(stComp.fund_flow||0).toFixed(0)}/25</span>
          </div>
          <div>
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">活跃度</div>
            <div class="bar-wrap" style="height:14px"><div class="bar-up" style="width:${(stComp.volume||0)/20*100}%;height:100%"></div></div>
            <span style="font-size:11px;float:right">${(stComp.volume||0).toFixed(0)}/20</span>
          </div>
          <div>
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">融资</div>
            <div class="bar-wrap" style="height:14px"><div class="bar-up" style="width:${(stComp.margin||0)/15*100}%;height:100%"></div></div>
            <span style="font-size:11px;float:right">${(stComp.margin||0).toFixed(0)}/15</span>
          </div>
          <div>
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">指数</div>
            <div class="bar-wrap" style="height:14px"><div class="bar-up" style="width:${(stComp.index||0)/15*100}%;height:100%"></div></div>
            <span style="font-size:11px;float:right">${(stComp.index||0).toFixed(0)}/15</span>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:12px;font-size:12px;color:#94a3b8">
          <span>涨停 <b style="color:#ef4444">${stDetail.limit_up||0}</b></span>
          <span>跌停 <b style="color:#22c55e">${stDetail.limit_down||0}</b></span>
          <span>流入比 <b>${((stDetail.pos_flow_ratio||0)*100).toFixed(1)}%</b></span>
          <span>主力 <b class="${(stDetail.total_main_flow_yi||0)>0?'positive':'negative'}">${(stDetail.total_main_flow_yi||0)>=0?'+':''}${(stDetail.total_main_flow_yi||0).toFixed(1)}亿</b></span>
          <span>融资 <b class="${(stDetail.total_margin_yi||0)>0?'positive':'negative'}">${(stDetail.total_margin_yi||0)>=0?'+':''}${(stDetail.total_margin_yi||0).toFixed(1)}亿</b></span>
          <span>均换手 <b>${(stDetail.avg_turnover||0).toFixed(2)}%</b></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 三大指数 ═══ -->
  <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    ${idxBar('sh','上证指数')} ${idxBar('sz','深证成指')} ${idxBar('cy','创业板指')} ${idxBar('kc50','科创50')} ${idxBar('hs300','沪深300')}
  </div>

  <!-- ═══ 市场状态 ═══ -->
  <div class="grid3" style="margin-bottom:16px">
    <div class="card stat">
      <div class="stat-label">市场状态</div>
      <div class="regime-badge ${regimeClass}">${d.regime_label||d.regime||'--'}</div>
      <div style="margin-top:4px;font-size:12px;color:#94a3b8">置信度 ${(d.confidence*100).toFixed(0)}% | 风险 <span class="${riskClass}">${riskLabel}</span></div>
    </div>
    <div class="card stat">
      <div class="stat-label">建议仓位</div>
      <div class="stat-value ${d.position_advice>50?'positive':d.position_advice<30?'negative':'warning'}">${d.position_advice||50}%</div>
      <div style="font-size:11px;color:#94a3b8">基准 ${d.position_base||50}%</div>
    </div>
    <div class="card stat">
      <div class="stat-label">5日趋势</div>
      <div class="stat-value ${d.trend_5d>0?'positive':'negative'}">${(d.trend_5d||0)>=0?'+':''}${(d.trend_5d||0).toFixed(1)}%</div>
      <div style="font-size:11px;color:#94a3b8">滚动中位数均值</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card"><h3>涨跌分布</h3>
      <div class="grid4" style="margin-bottom:8px">
        <div class="stat"><div class="stat-value positive">${(d.up_ratio*100).toFixed(1)}%</div><div class="stat-label">上涨比</div></div>
        <div class="stat"><div class="stat-value ${d.median_ret>0?'positive':'negative'}">${(d.median_ret||0)>=0?'+':''}${(d.median_ret||0).toFixed(1)}%</div><div class="stat-label">中位涨跌</div></div>
        <div class="stat"><div class="stat-value ${d.pos_flow_ratio>0.5?'positive':'negative'}">${(d.pos_flow_ratio*100).toFixed(1)}%</div><div class="stat-label">主力流入比</div></div>
        <div class="stat"><div class="stat-value neutral">${(d.stock_count||0).toLocaleString()}</div><div class="stat-label">覆盖个股</div></div>
      </div>
      <div style="font-size:12px">
        <div>主力净流入合计: <span class="${d.total_main_flow>0?'positive':'negative'}">${(d.total_main_flow/1e8).toFixed(1)}亿</span></div>
        <div>融资净买入合计: <span class="${d.total_margin_net>0?'positive':'negative'}">${(d.total_margin_net/1e8).toFixed(1)}亿</span></div>
      </div>
    </div>

    <div class="card"><h3>板块风向</h3>
      <div class="grid2">
        <div><div style="color:#22c55e;font-size:13px;margin-bottom:4px">领涨行业</div>
          ${(d.top_sectors||[]).map(s=>`<div style="font-size:12px;padding:2px 0">${s}</div>`).join('')||'<div class="neutral">--</div>'}
        </div>
        <div><div style="color:#ef4444;font-size:13px;margin-bottom:4px">领跌行业</div>
          ${(d.bottom_sectors||[]).map(s=>`<div style="font-size:12px;padding:2px 0">${s}</div>`).join('')||'<div class="neutral">--</div>'}
        </div>
      </div>
    </div>
  </div>

  <div class="card"><h3>风险预警</h3>
    ${(d.risk_alerts||[]).length ? d.risk_alerts.map(a=>`<div style="padding:4px 0">⚠️ ${a}</div>`).join('') : '<div style="color:#22c55e">✅ 无重大风险预警</div>'}
  </div>`;

  el.innerHTML = html;
  } catch(e) { showError(el, 'loadDiagnosis', e); }
}

// ── Picks ──
async function loadPicks() {
  const el = document.getElementById('picks-content');
  try {
  el.innerHTML = '<div class="loading">加载中...</div>';
  const date = document.getElementById('pick-date').value || '';
  const top = document.getElementById('pick-top').value;
  const data = await fetchAPI('/api/stock_picks?date='+date+'&top='+top);
  if(!data.picks || !data.picks.length) { el.innerHTML='<div class="error">无选股结果</div>'; return; }

  let html = `<div style="margin-bottom:8px;color:#94a3b8;font-size:13px">日期 ${data.date} | ${data.total} 只</div>
  <div style="overflow-x:auto"><table>
  <thead><tr>
    <th>#</th><th>代码</th><th>名称</th><th>现价</th><th>涨跌</th><th>主力流入</th><th>得分</th><th>行业</th><th>均线</th><th>突破</th><th>信号/风险</th>
  </tr></thead><tbody>`;

  data.picks.forEach(p => {
    const code = p.symbol || p.code || '';
    const chgClass = (p.chg||0)>0?'positive':'negative';
    const flowDisp = ((p.main_flow||0)/1e8).toFixed(2)+'亿';
    const maMark = (p.ma_align||0)>=0.5?'✓':((p.ma_align||0)>=0.25?'↑':'✗');
    const brkMark = p.breakout_20d?'✓':'-';
    const sigTags = (p.signals||[]).slice(0,2).map(s=>`<span class="tag tag-bull">${(s||'').substring(0,20)}</span>`).join(' ');
    const riskTags = (p.risks||[]).slice(0,2).map(s=>`<span class="tag tag-bear">${(s||'').substring(0,16)}</span>`).join(' ');
    html += `<tr>
      <td>${p.rank}</td><td style="font-weight:600">${code}</td><td>${p.name||''}</td>
      <td>${(p.price||0).toFixed(2)}</td><td class="${chgClass}">${(p.chg||0)>=0?'+':''}${(p.chg||0).toFixed(2)}%</td>
      <td>${flowDisp}</td><td style="font-weight:700;color:#38bdf8">${(p.score||0).toFixed(4)}</td>
      <td>${p.industry||'-'}</td><td>${maMark}</td><td>${brkMark}</td>
      <td style="max-width:300px">${sigTags} ${riskTags}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';

  // Factor breakdown for first pick
  if(data.picks[0] && data.picks[0].sub_scores) {
    html += '<div class="card" style="margin-top:16px"><h3>首只因子分解</h3><div class="grid4">';
    const ss = data.picks[0].sub_scores;
    for(const [k,v] of Object.entries(ss).slice(0,12)) {
      const pct = (v*100).toFixed(0);
      html += `<div style="font-size:12px"><span style="color:#94a3b8">${k}</span><div class="bar-wrap"><div class="bar-up" style="width:${pct}%"></div></div><span style="float:right">${(v).toFixed(2)}</span></div>`;
    }
    html += '</div></div>';
  }

  el.innerHTML = html;
  } catch(e) { showError(el, 'loadPicks', e); }
}

// ── Performance ──
async function loadPerformance() {
  const el = document.getElementById('perf-content');
  try {
  el.innerHTML = '<div class="loading">加载中...</div>';
  const data = await fetchAPI('/api/performance/summary');
  if(data._error) { el.innerHTML='<div class="error">'+data._error+'</div>'; return; }
  if(!data.total_picks) { el.innerHTML='<div class="card"><div class="neutral">暂无绩效数据，系统积累中</div></div>'; return; }

  const wr = data.win_rate||0;
  const wrClass = wr>=60?'positive':wr>=45?'warning':'negative';
  const fa = data.factor_analysis || {};
  const edge = fa.factor_edge != null ? fa.factor_edge : null;

  let html = `
  <div class="grid4" style="margin-bottom:16px">
    <div class="card stat"><div class="stat-label">累计选股</div><div class="stat-value">${data.total_picks}</div></div>
    <div class="card stat"><div class="stat-label">胜率</div><div class="stat-value ${wrClass}">${wr}%</div><div>${data.wins||0}赢/${data.losses||0}输</div></div>
    <div class="card stat"><div class="stat-label">均收益</div><div class="stat-value ${(data.avg_return||0)>0?'positive':'negative'}">${(data.avg_return||0)>=0?'+':''}${(data.avg_return||0).toFixed(2)}%</div></div>
    <div class="card stat"><div class="stat-label">累计收益</div><div class="stat-value ${(data.cum_return||0)>0?'positive':'negative'}">${(data.cum_return||0)>=0?'+':''}${(data.cum_return||0).toFixed(2)}%</div></div>
  </div>

  <div class="grid3">
    <div class="card stat"><div class="stat-label">最大涨幅</div><div class="stat-value positive">+${(data.max_gain||0).toFixed(2)}%</div></div>
    <div class="card stat"><div class="stat-label">最大跌幅</div><div class="stat-value negative">${(data.max_loss||0).toFixed(2)}%</div></div>
    <div class="card stat"><div class="stat-label">因子区分度</div><div class="stat-value ${edge!=null&&edge>0?'positive':'negative'}">${edge!=null?(edge>=0?'+':'')+edge.toFixed(2)+'%':'N/A'}</div></div>
  </div>`;

  if(data.recent_picks && data.recent_picks.length) {
    html += '<div class="card"><h3>最近交易</h3><table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>得分</th><th>次日收益</th></tr></thead><tbody>';
    data.recent_picks.reverse().forEach(p => {
      const retClass = (p.next_ret||0)>0?'positive':(p.next_ret||0)<0?'negative':'neutral';
      html += `<tr><td>${p.pick_date}</td><td style="font-weight:600">${p.code||''}</td><td>${p.name||''}</td><td>${(p.score||0).toFixed(4)}</td><td class="${retClass}">${(p.next_ret||0)>=0?'+':''}${(p.next_ret||0).toFixed(2)}%</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  el.innerHTML = html;
  } catch(e) { showError(el, 'loadPerformance', e); }
}

async function loadSchedulerStatus() {
  const el = document.getElementById('scheduler-status');
  try {
  const data = await fetchAPI('/api/scheduler/status');
  el.innerHTML = `
    <div class="grid3">
      <div class="stat"><div class="stat-label">最新数据日期</div><div class="stat-value" style="font-size:18px">${data.latest_data_date||'--'}</div></div>
      <div class="stat"><div class="stat-label">数据天数</div><div class="stat-value" style="font-size:18px">${data.data_dates_count||0}</div></div>
      <div class="stat"><div class="stat-label">数据目录</div><div style="font-size:11px;color:#94a3b8;word-break:break-all">${data.data_root||'--'}</div></div>
    </div>`;
  } catch(e) { showError(el, 'loadSchedulerStatus', e); }
}

async function triggerPipeline() {
  const resEl = document.getElementById('pipeline-result');
  const logEl = document.getElementById('pipeline-log');
  resEl.innerHTML = '<span style="color:#38bdf8">执行中...</span>';
  logEl.textContent = '执行中...\n';
  try {
    const data = await fetchAPI('/api/pipeline/run');
    if(data._error) { resEl.innerHTML = '<span style="color:#ef4444">✗ '+data._error+'</span>'; return; }
    if(data.success) {
      resEl.innerHTML = '<span style="color:#22c55e">✓ 完成</span>';
      logEl.textContent = JSON.stringify(data.result, null, 2);
    } else {
      resEl.innerHTML = '<span style="color:#ef4444">✗ '+data.error+'</span>';
      logEl.textContent = data.error;
    }
  } catch(e) {
    resEl.innerHTML = '<span style="color:#ef4444">✗ '+e.message+'</span>';
  }
}
